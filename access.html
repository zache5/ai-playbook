<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Playbook - Access Your Guide</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { text-align: center; max-width: 400px; padding: 40px; }
h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.sub { color: #94a3b8; font-size: 15px; margin-bottom: 32px; }
input { width: 100%; padding: 14px 18px; border: 2px solid #334155; border-radius: 10px; background: #1e293b; color: #e2e8f0; font-size: 16px; font-family: inherit; margin-bottom: 12px; outline: none; }
input:focus { border-color: #1e4f8a; }
button { width: 100%; padding: 14px; background: #1e4f8a; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }
button:hover { background: #163d6e; }
.error { color: #f87171; font-size: 14px; margin-top: 8px; display: none; }
.hint { color: #64748b; font-size: 13px; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
<h1>The AI Playbook</h1>
<p class="sub">Enter your access code to open the guide.</p>
<input type="password" id="code" placeholder="Access code" autofocus onkeydown="if(event.key==='Enter')check()">
<button onclick="check()">Access Guide</button>
<p class="error" id="err">Incorrect code. Check your purchase confirmation.</p>
<p class="hint">Your access code was included with your purchase.</p>
</div>
<script>
function check() {
  var code = document.getElementById('code').value.trim().toLowerCase();
  if (code === 'playbook2026') {
    window.location.href = 'guide.html';
  } else {
    document.getElementById('err').style.display = 'block';
  }
}
</script>
</body>
</html>
